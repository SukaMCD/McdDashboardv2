<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - SukaMCD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-[#000] text-[#fff] antialiased selection:bg-white selection:text-black min-h-screen flex flex-col justify-center items-center p-8 font-sans; }
        }
        @layer components {
            .glass { @apply bg-white/[0.03] backdrop-blur-md border border-white/[0.05]; }
            .silver-text {
                background: linear-gradient(to bottom, #fff, #a1a1aa, #3f3f46);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }
    </style>
</head>

<body class="antialiased selection:bg-white selection:text-black min-h-screen flex flex-col justify-center items-center p-8">
    <div class="w-full max-w-2xl mx-auto flex flex-col items-center text-center">
        <!-- Error Code -->
        <h1 class="text-8xl lg:text-9xl font-light tracking-tighter mb-4 silver-text">
            {{.Code}}
        </h1>
        
        <!-- Error Message -->
        <h2 class="text-2xl lg:text-3xl font-medium mb-6 tracking-tight text-white">
            {{.Message}}
        </h2>

        <!-- Description -->
        <p class="text-zinc-500 max-w-md mx-auto text-lg font-light leading-relaxed mb-12">
            {{.Description}}
        </p>

        <!-- Back Home -->
        <a href="/" class="glass px-8 py-3 rounded-full text-sm font-medium hover:bg-white/5 hover:border-white/20 hover:scale-[1.02] active:scale-95 transition-all duration-300 border border-white/10 inline-block">
            Back to Dashboard
        </a>
    </div>

    <!-- Footer decoration -->
    <div class="fixed bottom-0 left-0 w-full p-8 flex justify-between items-center opacity-30">
        <div class="text-[10px] tracking-[0.2em] uppercase text-zinc-600">SukaMCD System</div>
        <div class="h-px bg-zinc-800 flex-grow mx-8"></div>
        <div class="text-[10px] tracking-[0.2em] uppercase text-zinc-600">Error Protocol</div>
    </div>
</body>

</html>
