<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - SukaMCD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-black text-white antialiased font-sans; }
        }
        .glass { @apply bg-white/5 backdrop-blur-md border border-white/10; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-light tracking-tighter mb-2">SUKAMCD <span class="text-zinc-500 text-sm">v2</span></h1>
            <p class="text-zinc-500 font-light">Admin Access Gateway</p>
        </div>

        <div class="glass p-8 rounded-3xl">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Email or Username</label>
                    <input type="text" id="identifier" required
                        class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-zinc-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Password</label>
                    <input type="password" id="password" required
                        class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-zinc-500 transition-colors">
                </div>
                <button type="submit"
                    class="w-full bg-white text-black font-medium py-3 rounded-xl hover:bg-zinc-200 transition-colors flex items-center justify-center gap-2 group">
                    Authenticate
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="group-hover:translate-x-1 transition-transform" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8"/>
                    </svg>
                </button>
                <div id="error-msg" class="text-rose-500 text-xs text-center hidden pt-2"></div>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a href="/" class="text-zinc-500 hover:text-white text-xs transition-colors">Back to Hub</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();
                if (data.success) {
                    window.location.href = '/admin/dashboard';
                } else {
                    errorMsg.textContent = data.error || 'Authentication failed';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error occurred';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
